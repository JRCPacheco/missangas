<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Missangas Jane</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- PDF Export -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Header Mobile Only (Desktop header is in sidebar or top bar) -->
        <header class="main-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <!-- INSERIR LOGOTIPO AQUI -->
                    <!-- Troque o src="sua-logo.png" pelo caminho da sua imagem e remova o ícone lucide -->
                    <!-- <img src="sua-logo.png" alt="Logo Missangas Jane" style="width: 24px; height: 24px;"> -->
                    <i data-lucide="grid-3x3"></i>
                </div>
                <div>
                    <h1>Missangas Jane ✨</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="btn-undo" class="icon-btn" title="Desfazer">
                    <i data-lucide="undo-2"></i>
                </button>
                <button id="btn-redo" class="icon-btn" title="Refazer">
                    <i data-lucide="redo-2"></i>
                </button>
                <button id="btn-clear" class="icon-btn danger" title="Limpar Tudo">
                    <i data-lucide="trash-2"></i>
                </button>
                <button id="btn-settings" class="icon-btn" title="Configurações">
                    <i data-lucide="settings"></i>
                </button>
            </div>
        </header>
        <div class="content-layout">
            <!-- Left Sidebar: Tools -->
            <aside class="sidebar tools-sidebar">
                <!-- Tools Card -->
                <div class="card">
                    <h2>Ferramentas</h2>
                    <div class="tools-grid main-tools">
                        <button id="tool-pencil" class="tool-btn active" title="Lápis">
                            <i data-lucide="pencil"></i>
                            <span>Lápis</span>
                        </button>
                        <button id="tool-eraser" class="tool-btn" title="Borracha">
                            <i data-lucide="eraser"></i>
                            <span>Borracha</span>
                        </button>
                        <button id="tool-bucket" class="tool-btn" title="Balde de Tinta">
                            <i data-lucide="paint-bucket"></i>
                            <span>Balde</span>
                        </button>
                        <button id="tool-line" class="tool-btn" title="Linha Reta">
                            <i data-lucide="minus"></i>
                            <span>Reta</span>
                        </button>
                        <button id="btn-import-image" class="tool-btn" title="Importar Imagem" style="grid-column: span 2; background-color: var(--primary); color: white; border-color: var(--primary);">
                            <i data-lucide="image"></i>
                            <span style="color: white; font-weight: 600;">Importar Imagem</span>
                        </button>
                        <input type="file" id="input-image" accept="image/*" class="hidden">
                    </div>

                    <div class="divider" style="margin: 1rem 0;"></div>
                    
                    <h3 class="collapsible-title" id="toggle-shapes">Formas <i data-lucide="chevron-down"></i></h3>
                    <div class="tools-grid shapes-tools hidden" id="shapes-panel">
                        <button id="tool-square" class="tool-btn" title="Quadrado">
                            <i data-lucide="square"></i>
                            <span>Quadrado</span>
                        </button>
                        <button id="tool-circle" class="tool-btn" title="Círculo">
                            <i data-lucide="circle"></i>
                            <span>Círculo</span>
                        </button>
                    </div>

                    <div class="divider" style="margin: 1rem 0;"></div>
                    
                    <h3 class="collapsible-title" id="toggle-transform">Transformações <i data-lucide="chevron-down"></i></h3>
                    <div class="tools-grid transform-tools hidden" id="transform-panel">
                        <button id="action-mirror" class="tool-btn" title="Espelhar Horizontalmente">
                            <i data-lucide="flip-horizontal"></i>
                            <span>Espelhar</span>
                        </button>
                        <button id="action-rotate-left" class="tool-btn" title="Girar 90° Anti-horário">
                            <i data-lucide="rotate-ccw"></i>
                            <span>Girar Esq.</span>
                        </button>
                        <button id="action-rotate-right" class="tool-btn" title="Girar 90° Horário">
                            <i data-lucide="rotate-cw"></i>
                            <span>Girar Dir.</span>
                        </button>
                    </div>
                </div>

                <!-- Settings Modal (Initially Hidden) -->
                <div class="modal-overlay hidden" id="settings-modal">
                    <div class="modal-content">
                        <div class="modal-header">
                            <h2>Configurações do Tapete</h2>
                            <button id="btn-close-settings" class="icon-btn"><i data-lucide="x"></i></button>
                        </div>
                        
                        <div class="card no-shadow">
                            <div class="control-row">
                                <label>Linhas</label>
                                <div class="stepper">
                                    <button class="step-btn" data-action="dec-rows"><i data-lucide="minus"></i></button>
                                    <input type="number" id="input-rows" value="30" min="5" max="50" readonly>
                                    <button class="step-btn" data-action="inc-rows"><i data-lucide="plus"></i></button>
                                </div>
                            </div>
                            <div class="control-row">
                                <label>Colunas</label>
                                <div class="stepper">
                                    <button class="step-btn" data-action="dec-cols"><i data-lucide="minus"></i></button>
                                    <input type="number" id="input-cols" value="20" min="5" max="50" readonly>
                                    <button class="step-btn" data-action="inc-cols"><i data-lucide="plus"></i></button>
                                </div>
                            </div>
                            <div class="control-row">
                                <label>Zoom</label>
                                <input type="range" id="input-zoom" min="10" max="40" value="20">
                            </div>
                        </div>

                        <!-- Export Card inside settings -->
                        <div class="card no-shadow mt-4">
                            <h2>Exportar e Imprimir</h2>
                            <div class="export-row">
                                <button id="btn-print" class="btn btn-primary">
                                    <i data-lucide="printer"></i> Imprimir
                                </button>
                                <button id="btn-pdf" class="btn btn-secondary">
                                    <i data-lucide="file-down"></i> Salvar Imagem
                                </button>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Custom Clear Confirmation Modal -->
                <div class="modal-overlay hidden" id="clear-modal">
                    <div class="modal-content text-center">
                        <div class="danger-icon-wrapper">
                            <i data-lucide="alert-triangle" class="text-danger"></i>
                        </div>
                        <h2>Apagar tudo?</h2>
                        <p class="text-muted">Isso vai apagar todo o seu desenho atual. Deseja continuar?</p>
                        <div class="actions-row mt-4">
                            <button id="btn-cancel-clear" class="btn btn-secondary">Não, voltar</button>
                            <button id="btn-confirm-clear" class="btn btn-danger">Sim, apagar</button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Canvas Area -->
            <main class="canvas-area">
                <div class="canvas-wrapper">
                    <div id="grid-canvas" class="grid-canvas">
                        <!-- Grid cells injected here -->
                    </div>
                </div>
            </main>

            <!-- Right Sidebar: Colors -->
            <aside class="sidebar colors-sidebar">
                <!-- Colors Card -->
                <div class="card">
                    <h2>Cores</h2>
                    <div class="palette-grid" id="palette-grid">
                        <!-- Colors injected by JS -->
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
