<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Missangas Jane</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="js/lib/lucide.min.js"></script>
    <script src="js/lib/jspdf.min.js"></script>
    <script src="js/lib/html2canvas.min.js"></script>
</head>
<body>
    <div class="app-wrapper">
        <!-- Header -->
        <header class="main-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <img src="assets/icon.png" alt="Missangas Jane" style="width: 28px; height: 28px; border-radius: 6px; object-fit: cover;">
                </div>
                <div>
                    <h1>Missangas Jane ✨</h1>
                </div>
            </div>
            
            <div class="header-actions">
                <button id="btn-undo" class="icon-btn" title="Desfazer">
                    <i data-lucide="undo-2"></i>
                </button>
                <button id="btn-redo" class="icon-btn" title="Refazer">
                    <i data-lucide="redo-2"></i>
                </button>
                <div class="header-divider"></div>
                <button id="btn-print" class="icon-btn" title="Imprimir">
                    <i data-lucide="printer"></i>
                </button>
                <button id="btn-pdf" class="icon-btn" title="Salvar Imagem">
                    <i data-lucide="file-down"></i>
                </button>
                <div class="header-divider"></div>
                <button id="btn-clear" class="icon-btn danger" title="Limpar Tudo">
                    <i data-lucide="trash-2"></i>
                </button>
            </div>
        </header>

        <div class="content-layout">
            <!-- Left Sidebar: Tools -->
            <aside class="sidebar tools-sidebar">
                
                <!-- Tools Card -->
                <div class="card">
                    <h2>Ferramentas</h2>
                    <div class="tools-grid main-tools">
                        <button id="tool-pencil" class="tool-btn active" title="Lápis">
                            <i data-lucide="pencil"></i>
                            <span>Lápis</span>
                        </button>
                        <button id="tool-eraser" class="tool-btn" title="Borracha">
                            <i data-lucide="eraser"></i>
                            <span>Borracha</span>
                        </button>
                        <button id="tool-bucket" class="tool-btn" title="Balde de Tinta">
                            <i data-lucide="paint-bucket"></i>
                            <span>Balde</span>
                        </button>
                        <button id="tool-line" class="tool-btn" title="Linha Reta">
                            <i data-lucide="minus"></i>
                            <span>Reta</span>
                        </button>
                        <button id="btn-import-image" class="tool-btn import-btn" title="Importar Imagem" style="grid-column: span 2;">
                            <i data-lucide="image"></i>
                            <span>Importar Imagem</span>
                        </button>
                        <input type="file" id="input-image" accept="image/*" class="hidden">
                    </div>
                </div>

                <!-- Shapes Card (Always Visible) -->
                <div class="card">
                    <h2>Formas</h2>
                    <div class="tools-grid shapes-tools">
                        <button id="tool-square" class="tool-btn" title="Quadrado">
                            <i data-lucide="square"></i>
                            <span>Quadrado</span>
                        </button>
                        <button id="tool-circle" class="tool-btn" title="Círculo">
                            <i data-lucide="circle"></i>
                            <span>Círculo</span>
                        </button>
                    </div>
                </div>

                <!-- Transforms Card (Always Visible) -->
                <div class="card">
                    <h2>Transformações</h2>
                    <div class="tools-grid transform-tools">
                        <button id="action-mirror" class="tool-btn" title="Espelhar Horizontalmente">
                            <i data-lucide="flip-horizontal"></i>
                            <span>Espelhar</span>
                        </button>
                        <button id="action-rotate-left" class="tool-btn" title="Girar 90° Anti-horário">
                            <i data-lucide="rotate-ccw"></i>
                            <span>Girar ←</span>
                        </button>
                        <button id="action-rotate-right" class="tool-btn" title="Girar 90° Horário">
                            <i data-lucide="rotate-cw"></i>
                            <span>Girar →</span>
                        </button>
                    </div>
                </div>

                <!-- Custom Clear Confirmation Modal -->
                <div class="modal-overlay hidden" id="clear-modal">
                    <div class="modal-content text-center">
                        <div class="danger-icon-wrapper">
                            <i data-lucide="alert-triangle" class="text-danger"></i>
                        </div>
                        <h2>Apagar tudo?</h2>
                        <p class="text-muted">Isso vai apagar todo o seu desenho atual. Deseja continuar?</p>
                        <div class="actions-row mt-4">
                            <button id="btn-cancel-clear" class="btn btn-secondary">Não, voltar</button>
                            <button id="btn-confirm-clear" class="btn btn-danger">Sim, apagar</button>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Main Canvas Area -->
            <main class="canvas-area" id="canvas-area">
                <!-- Zoom bar above canvas -->
                <div class="zoom-bar">
                    <button class="zoom-btn" id="btn-zoom-out" title="Diminuir">
                        <i data-lucide="zoom-out"></i>
                    </button>
                    <input type="range" id="input-zoom" min="10" max="50" value="24" title="Zoom">
                    <button class="zoom-btn" id="btn-zoom-in" title="Aumentar">
                        <i data-lucide="zoom-in"></i>
                    </button>
                </div>
                <div class="canvas-wrapper">
                    <div class="thread-guide" id="thread-guide">
                        <!-- Row numbers injected by JS -->
                    </div>
                    <div id="grid-canvas" class="grid-canvas">
                        <!-- Grid cells injected here -->
                    </div>
                </div>
            </main>

            <!-- Right Sidebar: Colors -->
            <aside class="sidebar colors-sidebar">
                <div class="card">
                    <h2>Cores</h2>
                    <div class="palette-grid" id="palette-grid">
                        <!-- Colors injected by JS -->
                    </div>
                </div>
            </aside>
        </div>
    </div>

    <!-- Floating Donation Button -->
    <button id="btn-donation" class="floating-btn" title="Contribuir com o projeto">
        <i data-lucide="qr-code"></i>
    </button>

    <!-- Donation Modal -->
    <div class="modal-overlay hidden" id="donation-modal">
        <div class="modal-content text-center">
            <div class="donation-image-wrapper">
                <img src="assets/coffee.png" alt="Pague um café" class="donation-img">
            </div>
            <h2>Apoie o Projeto! ☕</h2>
            <p class="text-muted">Se achou o app útil, considere nos pagar um café para contribuir com o projeto.</p>
            <div class="pix-card">
                <code id="pix-key-display">b5ce2235-461f-4581-afdb-3b257fc56d0c</code>
                <button id="btn-copy-pix" class="btn btn-secondary btn-sm">
                    <i data-lucide="copy"></i> Copiar Chave Pix
                </button>
            </div>
            <div class="actions-row mt-4">
                <button id="btn-close-donation" class="btn btn-secondary">Fechar</button>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script>
        // Initialize Lucide icons
        lucide.createIcons();
    </script>
</body>
</html>
